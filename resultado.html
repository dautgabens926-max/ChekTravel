<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado de tu pago | ChekTravel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    max-width: 440px;
    width: 100%;
    padding: 40px 32px;
    text-align: center;
  }
  .icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
  }
  .icon.ok { background: #e6f9ed; color: #1a9f5c; }
  .icon.fail { background: #fdeaea; color: #d9463f; }
  .icon.pending { background: #fff6e0; color: #c9932a; }
  h1 { font-size: 22px; margin-bottom: 10px; color: #1a1a2e; }
  p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 6px; }
  .reserva {
    background: #f5f7fa;
    border-radius: 10px;
    padding: 12px 16px;
    margin: 20px 0;
    font-size: 14px;
    color: #444;
  }
  .reserva strong { color: #1a1a2e; }
  .btn {
    display: inline-block;
    margin-top: 24px;
    padding: 14px 28px;
    background: #1a1a2e;
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn.secondary {
    background: transparent;
    color: #1a1a2e;
    border: 1px solid #ddd;
    margin-left: 10px;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <!-- Contenido inyectado por JS según el resultado -->
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const ok = params.get("ok");
  const status = params.get("status");
  const reserva = params.get("reserva");
  const reason = params.get("reason");

  const card = document.getElementById("card");

  function render({ iconClass, icon, title, message, showReserva }) {
    let html = `
      <div class="icon ${iconClass}">${icon}</div>
      <h1>${title}</h1>
      <p>${message}</p>
    `;
    if (showReserva && reserva) {
      html += `<div class="reserva">N° de reserva: <strong>${reserva}</strong></div>`;
    }
    html += `
      <div>
        <a href="/" class="btn">Volver al inicio</a>
        <a href="mailto:contacto@chektravel.com" class="btn secondary">Contactar soporte</a>
      </div>
    `;
    card.innerHTML = html;
  }

  if (ok === "1") {
    render({
      iconClass: "ok",
      icon: "✓",
      title: "¡Pago aprobado!",
      message: "Tu reserva fue confirmada correctamente. Te enviaremos los detalles por correo.",
      showReserva: true,
    });
  } else if (ok === "0") {
    render({
      iconClass: "fail",
      icon: "✕",
      title: "Pago rechazado",
      message: "Transbank no pudo procesar tu pago. Puedes intentarlo nuevamente o usar otro medio de pago.",
      showReserva: true,
    });
  } else if (status === "cancelado") {
    render({
      iconClass: "pending",
      icon: "!",
      title: "Pago cancelado",
      message: "Cancelaste el proceso de pago antes de finalizar. Tu reserva no fue confirmada.",
      showReserva: false,
    });
  } else {
    render({
      iconClass: "fail",
      icon: "!",
      title: "Ocurrió un problema",
      message: "No pudimos confirmar el estado de tu pago. Si el cargo se realizó, contáctanos con el detalle.",
      showReserva: false,
    });
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChekTravel</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb}
header{background:#0b63ce;color:#fff;padding:18px;text-align:center}
nav a{color:#fff;text-decoration:none;margin:0 10px}
.hero{padding:50px 20px;text-align:center;background:linear-gradient(135deg,#0b63ce,#4fc3ff);color:#fff}
.section{max-width:1100px;margin:auto;padding:30px 20px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 4px 14px rgba(0,0,0,.1);margin-bottom:20px}
.btn{display:inline-block;background:#0b63ce;color:#fff;padding:12px 18px;border-radius:8px;text-decoration:none}
iframe{width:100%;height:500px;border:0}
footer{background:#111;color:#fff;text-align:center;padding:20px}
</style>
</head>
<body>
<header>
<h1>ChekTravel</h1>
<nav>
<a href="#hoteles">Hoteles</a>
<a href="#vuelos">Vuelos</a>
<a href="#expedia">Expedia</a>
<a href="#iberia">Iberia</a>
</nav>
</header>

<section class="hero">
<h2>Encuentra vuelos, hoteles y experiencias</h2>
<p>Reserva con nuestros socios.</p>
</section>

<section id="hoteles" class="section">
<div class="card">
<h2>Hoteles</h2>
<p>Inserta aquí tu widget de hoteles.</p>
</div>
</section>

<section id="vuelos" class="section">
<div class="card">
<h2>Kiwi.com</h2>
<p>Inserta aquí tu widget de Kiwi.com.</p>
</div>
</section>

<section id="expedia" class="section">
<div class="card">
<h2>Expedia</h2>
<p>Inserta aquí tu widget de Expedia.</p>
</div>
</section>

<section id="iberia" class="section">
<div class="card">
<h2>Iberia</h2>
<a class="btn" href="https://www.anrdoezrs.net/" target="_blank">Ir a Iberia</a>
</div>
</section>

<footer>© 2026 ChekTravel</footer>
</body>
</html>
